name: "Feature Version"
description: "新バージョンの実装タスク（plan.md に基づく）"
labels: ["plan"]
body:
  - type: input
    id: feature
    attributes:
      label: "Feature (RX)"
      description: "対象フィーチャー"
      placeholder: "R2"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version (VX)"
      description: "新バージョン番号"
      placeholder: "V6"
    validations:
      required: true
  - type: textarea
    id: plan-link
    attributes:
      label: "plan.md リンク"
      description: "関連する plan.md へのパス"
      placeholder: "docs/projects/features/R2/V6/plan.md"
    validations:
      required: true
  - type: textarea
    id: previous-issues
    attributes:
      label: "前版の課題"
      description: "前バージョンの issues.md から引用、または新たに発見した問題"
    validations:
      required: true
  - type: textarea
    id: design-summary
    attributes:
      label: "設計方針サマリ"
      description: "plan.md の設計方針を要約"
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: "実装チェックリスト"
      options:
        - label: "plan.md に従って実装"
        - label: "pnpm build 通過"
        - label: "pnpm lint 通過"
        - label: "動作検証完了"
        - label: "spec.md を実装後の状態に更新"
        - label: "README.md のバージョン履歴を更新"
